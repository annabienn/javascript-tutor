<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JavaScript Tutor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">JS</div>
        <div>
          <p class="eyebrow">Εκπαιδευτικό Λογισμικό</p>
          <h1>JavaScript Tutor</h1>
        </div>
      </div>

      <div class="auth-shell">
        <div id="auth-actions" class="auth-actions">
          <button id="login-open" type="button" class="ghost-button">Είσοδος</button>
          <button id="register-open" type="button">Εγγραφή</button>
        </div>

        <div id="auth-user" class="auth-user" hidden>
          <span id="auth-user-label"></span>
          <button id="logout-btn" type="button" class="ghost-button">Αποσύνδεση</button>
        </div>

        <form id="user-form" class="auth-panel" hidden>
          <div class="auth-panel-head">
            <strong id="auth-title">Είσοδος</strong>
            <button id="auth-close" type="button" class="icon-button" aria-label="Κλείσιμο">×</button>
          </div>
          <label id="name-field" class="auth-field" for="name-input">
            <span>Όνομα</span>
            <input id="name-input" type="text" maxlength="40" placeholder="Όνομα μαθητή" autocomplete="name">
          </label>
          <label class="auth-field" for="email-input">
            <span>Email</span>
            <input id="email-input" type="email" maxlength="80" placeholder="student@example.com" autocomplete="email" required>
          </label>
          <button id="auth-submit" type="submit">Σύνδεση</button>
          <p id="auth-message" class="auth-message" aria-live="polite"></p>
        </form>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="panel path-panel">
          <div class="panel-title">
            <span class="panel-icon" aria-hidden="true">1</span>
            <h2>Μαθησιακή διαδρομή</h2>
          </div>
          <div id="path-list" class="path-list"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <span class="panel-icon" aria-hidden="true">%</span>
            <h2>Αναφορές</h2>
          </div>
          <div class="stat-grid">
            <div>
              <span id="average-score">0%</span>
              <small>Μέση επίδοση</small>
            </div>
            <div>
              <span id="attempt-count">0</span>
              <small>Προσπάθειες</small>
            </div>
            <div>
              <span id="activity-count">0</span>
              <small>Δραστηριότητες</small>
            </div>
            <div>
              <span id="completed-count">0/7</span>
              <small>Ολοκληρωμένες</small>
            </div>
            <div>
              <span id="study-time">0'</span>
              <small>Χρόνος</small>
            </div>
          </div>
          <div id="report-bars" class="report-bars"></div>
          <div id="report-details" class="report-details"></div>
        </section>
      </aside>

      <section class="workspace">
        <section class="course-nav" aria-label="Πλοήγηση μαθημάτων">
          <div>
            <p class="section-kicker">Course Navigator</p>
            <h2>Επιλογή ενότητας</h2>
            <p id="module-summary" class="module-summary"></p>
          </div>
          <div class="module-select-wrap">
            <label class="sr-only" for="module-select">Επιλογή ενότητας</label>
            <select id="module-select" class="module-select"></select>
          </div>
        </section>
        <article id="lesson" class="lesson"></article>

        <section class="quiz-area">
          <div class="quiz-head">
            <div>
              <p class="section-kicker">Αυτοαξιολόγηση</p>
              <h2 id="quiz-title">Quiz ενότητας</h2>
            </div>
            <button id="review-btn" type="button">Επαναληπτικό Quiz</button>
          </div>
          <form id="quiz-form" class="quiz-form"></form>
          <div id="quiz-result" class="quiz-result" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
